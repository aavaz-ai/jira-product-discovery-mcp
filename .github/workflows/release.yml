name: Publish npm package

on:
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

concurrency:
    group: npm-publish
    cancel-in-progress: false

jobs:
    publish:
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        environment: npm

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: '22'
                  registry-url: https://registry.npmjs.org

            - name: Upgrade npm for Trusted Publishing
              run: npm install --global npm@11.17.0

            - name: Install dependencies
              run: npm ci

            - name: Validate release candidate
              run: |
                  npm run format:check
                  npm run lint
                  npm test -- --runInBand
                  npm audit --omit=dev --audit-level=high

            - name: Pack release artifact
              id: package
              run: |
                  mkdir release-artifact
                  tarball_name="$(npm pack --pack-destination release-artifact | tail -n 1)"
                  test -n "$tarball_name"
                  test -f "release-artifact/$tarball_name"
                  echo "tarball=release-artifact/$tarball_name" >> "$GITHUB_OUTPUT"

            - name: Smoke exact release artifact
              run: node scripts/packed-npx-smoke.mjs "${{ steps.package.outputs.tarball }}"

            - name: Publish exact artifact with provenance
              run: npm publish "${{ steps.package.outputs.tarball }}" --provenance --access public
